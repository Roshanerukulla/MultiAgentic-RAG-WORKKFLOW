apiVersion: apps/v1
kind: Deployment
metadata:
  name: reasoning-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reasoning-agent
  template:
    metadata:
      labels:
        app: reasoning-agent
    spec:
      containers:
      - name: reasoning-agent
        image: reasoning-agent:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8002
        env:
        - name: COHERE_API_KEY
          valueFrom:
            secretKeyRef:
              name: cohere-secret
              key: COHERE_API_KEY
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 20
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: reasoning-agent
spec:
  selector:
    app: reasoning-agent
  ports:
  - port: 8002
    targetPort: 8002