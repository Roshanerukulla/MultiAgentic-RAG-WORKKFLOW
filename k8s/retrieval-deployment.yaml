apiVersion: apps/v1
kind: Deployment
metadata:
  name: retrieval-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retrieval-agent
  template:
    metadata:
      labels:
        app: retrieval-agent
    spec:
      containers:
      - name: retrieval-agent
        image: retrieval-agent:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8001
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: retrieval-agent
spec:
  selector:
    app: retrieval-agent
  ports:
  - port: 8001
    targetPort: 8001