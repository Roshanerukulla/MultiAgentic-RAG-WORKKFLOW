apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
      - name: orchestrator
        image: orchestrator:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: RETRIEVAL_URL
          value: "http://retrieval-agent:8001"
        - name: REASONING_URL
          value: "http://reasoning-agent:8002"
        - name: VALIDATION_URL
          value: "http://validation-agent:8003"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
spec:
  type: NodePort
  selector:
    app: orchestrator
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30000